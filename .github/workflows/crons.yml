name: Sofia — Automações Agendadas (backup)

on:
  schedule:
    # Follow-up: a cada hora no minuto 5 (offset para não conflitar com Vercel cron)
    - cron: '5 * * * *'
    # Re-engajamento: às 9h05, 15h05, 21h05 UTC
    - cron: '5 9,15,21 * * *'
    # Relatório diário: 10h50 UTC = 7h50 Brasília (seg–sex)
    - cron: '50 10 * * 1-5'
    # Liberação drip da fila: 11h00 UTC = 8h00 Brasília (seg–sex)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Qual job executar'
        required: true
        default: 'followup'
        type: choice
        options: [followup, reengagement, relatorio, liberar, todos]

env:
  API_URL: ${{ secrets.VERCEL_API_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  # ── Follow-up automático ──────────────────────────────────────────
  followup:
    name: Follow-up Automático
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'followup' || inputs.job == 'todos')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '5 * * * *'))
    steps:
      - name: Verificar secrets
        run: |
          if [ -z "$API_URL" ]; then echo "❌ VERCEL_API_URL não configurado"; exit 1; fi
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET não configurado"; exit 1; fi
          echo "✅ Secrets OK — chamando $API_URL"
      - name: Executar follow-up
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL/api/cron/followup" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 90)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE | Body: $BODY"
          [ "$HTTP_CODE" = "200" ] && echo "✅ Follow-up OK" || (echo "❌ Falha HTTP $HTTP_CODE" && exit 1)

  # ── Re-engajamento ───────────────────────────────────────────────
  reengagement:
    name: Re-engajamento de Leads
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'reengagement' || inputs.job == 'todos')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '5 9,15,21'))
    steps:
      - name: Verificar secrets
        run: |
          if [ -z "$API_URL" ]; then echo "❌ VERCEL_API_URL não configurado"; exit 1; fi
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET não configurado"; exit 1; fi
      - name: Executar re-engajamento
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL/api/cron/reengagement" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE | Body: $BODY"
          [ "$HTTP_CODE" = "200" ] && echo "✅ Re-engajamento OK" || echo "⚠️ HTTP $HTTP_CODE (pode não ter leads p/ reengajar)"

  # ── Relatório diário ─────────────────────────────────────────────
  relatorio:
    name: Relatório Diário para Hariton
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'relatorio' || inputs.job == 'todos')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '50 10'))
    steps:
      - name: Verificar secrets
        run: |
          if [ -z "$API_URL" ]; then echo "❌ VERCEL_API_URL não configurado"; exit 1; fi
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET não configurado"; exit 1; fi
      - name: Enviar relatório
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL/api/cron/relatorio" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] && echo "✅ Relatório enviado" || echo "❌ Falha HTTP $HTTP_CODE"

  # ── Liberação drip da fila (até MAX_LEADS_DIA/dia útil) ──────────────
  liberar:
    name: Liberar Leads da Fila
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'liberar' || inputs.job == 'todos')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 11'))
    steps:
      - name: Verificar secrets
        run: |
          if [ -z "$API_URL" ]; then echo "❌ VERCEL_API_URL não configurado"; exit 1; fi
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET não configurado"; exit 1; fi
      - name: Liberar leads do dia
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL/api/cron/liberar-leads" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 90)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE | Body: $BODY"
          [ "$HTTP_CODE" = "200" ] && echo "✅ Liberação OK" || (echo "❌ Falha HTTP $HTTP_CODE" && exit 1)
